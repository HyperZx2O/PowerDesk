<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="520" fill="#f5f0e8"/>

  <!-- Outer building boundary -->
  <rect x="10" y="10" width="870" height="470" fill="none" stroke="#9a8a78" stroke-width="3" rx="4"/>

  <!-- Room divider walls -->
  <line x1="305" y1="10" x2="305" y2="430" stroke="#9a8a78" stroke-width="2"/>
  <line x1="600" y1="10" x2="600" y2="430" stroke="#9a8a78" stroke-width="2"/>

  <!-- Corridor floor line -->
  <line x1="10" y1="430" x2="880" y2="430" stroke="#9a8a78" stroke-width="1.5" strokeDasharray="4 3"/>

  <!-- ═══════════ ROOM 1: DRAWING ROOM ═══════════ -->
  <g id="drawing-room" data-room="drawing-room">
    <rect x="10" y="10" width="295" height="420" fill="#e8dcc8"/>

    <!-- Room label -->
    <text x="157" y="220" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#7a6a58" text-anchor="middle" letterSpacing="0.05em">DRAWING ROOM</text>

    <!-- Furniture -->
    <rect x="20" y="270" width="110" height="50" rx="4" fill="#c9b89a" opacity="0.8"/>
    <rect x="50" y="330" width="60" height="35" rx="2" fill="#8b7355" opacity="0.7"/>
    <rect x="20" y="350" width="55" height="45" rx="4" fill="#c9b89a" opacity="0.8"/>

    <!-- Plants -->
    <circle cx="35" cy="35" r="10" fill="#5a8a3c" opacity="0.6"/>
    <line x1="35" y1="35" x2="35" y2="48" stroke="#5a8a3c" stroke-width="2" opacity="0.7"/>
    <circle cx="35" cy="415" r="10" fill="#5a8a3c" opacity="0.6"/>
    <line x1="35" y1="415" x2="35" y2="428" stroke="#5a8a3c" stroke-width="2" opacity="0.7"/>

    <!-- Door arc (bottom wall, left side) -->
    <path d="M 120 430 A 30 30 0 0 0 90 400" fill="none" stroke="#6b5a47" stroke-width="1.5"/>

    <!-- Window (left wall, top portion) -->
    <rect x="10" y="80" width="6" height="80" fill="#b0d4e8" stroke="#7a9eb0" stroke-width="0.5" rx="1"/>

    <!-- Fan 1 -->
    <g id="drawing-room-fan-1" data-device="drawing-room-fan-1" data-type="fan" data-room="drawing-room">
      <circle cx="155" cy="80" r="10" fill="none" stroke="#5a4a3a" stroke-width="1.5"/>
      <path d="M 155 70 L 160 90 L 155 85 L 150 90 Z" fill="#5a4a3a"/>
      <text x="155" y="105" font-family="Inter, sans-serif" font-size="8" fill="#7a6a58" text-anchor="middle">Fan 1</text>
    </g>

    <!-- Fan 2 -->
    <g id="drawing-room-fan-2" data-device="drawing-room-fan-2" data-type="fan" data-room="drawing-room">
      <circle cx="155" cy="310" r="10" fill="none" stroke="#5a4a3a" stroke-width="1.5"/>
      <path d="M 155 300 L 160 320 L 155 315 L 150 320 Z" fill="#5a4a3a"/>
      <text x="155" y="335" font-family="Inter, sans-serif" font-size="8" fill="#7a6a58" text-anchor="middle">Fan 2</text>
    </g>

    <!-- Light 1 -->
    <g id="drawing-room-light-1" data-device="drawing-room-light-1" data-type="light" data-room="drawing-room">
      <circle cx="60" cy="60" r="7" fill="#c8b99a" stroke="#c8b99a" stroke-width="1"/>
      <text x="60" y="80" font-family="Inter, sans-serif" font-size="8" fill="#7a6a58" text-anchor="middle">Light 1</text>
    </g>

    <!-- Light 2 -->
    <g id="drawing-room-light-2" data-device="drawing-room-light-2" data-type="light" data-room="drawing-room">
      <circle cx="255" cy="60" r="7" fill="#c8b99a" stroke="#c8b99a" stroke-width="1"/>
      <text x="255" y="80" font-family="Inter, sans-serif" font-size="8" fill="#7a6a58" text-anchor="middle">Light 2</text>
    </g>

    <!-- Light 3 -->
    <g id="drawing-room-light-3" data-device="drawing-room-light-3" data-type="light" data-room="drawing-room">
      <circle cx="157" cy="190" r="7" fill="#c8b99a" stroke="#c8b99a" stroke-width="1"/>
      <text x="157" y="210" font-family="Inter, sans-serif" font-size="8" fill="#7a6a58" text-anchor="middle">Light 3</text>
    </g>
  </g>

  <!-- ═══════════ ROOM 2: WORK ROOM 1 ═══════════ -->
  <g id="work-room-1" data-room="work-room-1">
    <rect x="305" y="10" width="295" height="420" fill="#f0eeea"/>

    <text x="452" y="220" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#7a6a58" text-anchor="middle" letterSpacing="0.05em">WORK ROOM 1</text>

    <!-- Desks (2x2 grid) -->
    <rect x="325" y="145" width="80" height="55" rx="2" fill="#8b7355" opacity="0.7"/>
    <rect x="470" y="145" width="80" height="55" rx="2" fill="#8b7355" opacity="0.7"/>
    <rect x="325" y="275" width="80" height="55" rx="2" fill="#8b7355" opacity="0.7"/>
    <rect x="470" y="275" width="80" height="55" rx="2" fill="#8b7355" opacity="0.7"/>

    <!-- Monitors on desks -->
    <rect x="345" y="148" width="40" height="4" rx="1" fill="#2d2d2d"/>
    <rect x="490" y="148" width="40" height="4" rx="1" fill="#2d2d2d"/>
    <rect x="345" y="278" width="40" height="4" rx="1" fill="#2d2d2d"/>
    <rect x="490" y="278" width="40" height="4" rx="1" fill="#2d2d2d"/>

    <!-- Plant bottom-center -->
    <circle cx="452" cy="415" r="10" fill="#5a8a3c" opacity="0.6"/>
    <line x1="452" y1="415" x2="452" y2="428" stroke="#5a8a3c" stroke-width="2" opacity="0.7"/>

    <!-- Door arc (bottom wall, center-left) -->
    <path d="M 410 430 A 30 30 0 0 0 380 400" fill="none" stroke="#6b5a47" stroke-width="1.5"/>

    <!-- Fan 1 -->
    <g id="work-room-1-fan-1" data-device="work-room-1-fan-1" data-type="fan" data-room="work-room-1">
      <circle cx="452" cy="80" r="10" fill="none" stroke="#5a4a3a" stroke-width="1.5"/>
      <path d="M 452 70 L 457 90 L 452 85 L 447 90 Z" fill="#5a4a3a"/>
      <text x="452" y="105" font-family="Inter, sans-serif" font-size="8" fill="#7a6a58" text-anchor="middle">Fan 1</text>
    </g>

    <!-- Fan 2 -->
    <g id="work-room-1-fan-2" data-device="work-room-1-fan-2" data-type="fan" data-room="work-room-1">
      <circle cx="452" cy="310" r="10" fill="none" stroke="#5a4a3a" stroke-width="1.5"/>
      <path d="M 452 300 L 457 320 L 452 315 L 447 320 Z" fill="#5a4a3a"/>
      <text x="452" y="335" font-family="Inter, sans-serif" font-size="8" fill="#7a6a58" text-anchor="middle">Fan 2</text>
    </g>

    <!-- Light 1 -->
    <g id="work-room-1-light-1" data-device="work-room-1-light-1" data-type="light" data-room="work-room-1">
      <circle cx="355" cy="60" r="7" fill="#c8b99a" stroke="#c8b99a" stroke-width="1"/>
      <text x="355" y="80" font-family="Inter, sans-serif" font-size="8" fill="#7a6a58" text-anchor="middle">Light 1</text>
    </g>

    <!-- Light 2 -->
    <g id="work-room-1-light-2" data-device="work-room-1-light-2" data-type="light" data-room="work-room-1">
      <circle cx="550" cy="60" r="7" fill="#c8b99a" stroke="#c8b99a" stroke-width="1"/>
      <text x="550" y="80" font-family="Inter, sans-serif" font-size="8" fill="#7a6a58" text-anchor="middle">Light 2</text>
    </g>

    <!-- Light 3 -->
    <g id="work-room-1-light-3" data-device="work-room-1-light-3" data-type="light" data-room="work-room-1">
      <circle cx="452" cy="390" r="7" fill="#c8b99a" stroke="#c8b99a" stroke-width="1"/>
      <text x="452" y="410" font-family="Inter, sans-serif" font-size="8" fill="#7a6a58" text-anchor="middle">Light 3</text>
    </g>
  </g>

  <!-- ═══════════ ROOM 3: WORK ROOM 2 ═══════════ -->
  <g id="work-room-2" data-room="work-room-2">
    <rect x="600" y="10" width="280" height="420" fill="#ddd0b8"/>

    <text x="740" y="220" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#7a6a58" text-anchor="middle" letterSpacing="0.05em">WORK ROOM 2</text>

    <!-- Desks (2x2 grid) -->
    <rect x="620" y="145" width="80" height="55" rx="2" fill="#8b7355" opacity="0.7"/>
    <rect x="765" y="145" width="80" height="55" rx="2" fill="#8b7355" opacity="0.7"/>
    <rect x="620" y="275" width="80" height="55" rx="2" fill="#8b7355" opacity="0.7"/>
    <rect x="765" y="275" width="80" height="55" rx="2" fill="#8b7355" opacity="0.7"/>

    <!-- Monitors on desks -->
    <rect x="640" y="148" width="40" height="4" rx="1" fill="#2d2d2d"/>
    <rect x="785" y="148" width="40" height="4" rx="1" fill="#2d2d2d"/>
    <rect x="640" y="278" width="40" height="4" rx="1" fill="#2d2d2d"/>
    <rect x="785" y="278" width="40" height="4" rx="1" fill="#2d2d2d"/>

    <!-- Water cooler (bottom-right) -->
    <rect x="840" y="400" width="20" height="18" rx="2" fill="#b0c8e0" opacity="0.6"/>
    <circle cx="850" cy="395" r="6" fill="#b0c8e0" opacity="0.7"/>

    <!-- Plant bottom-right -->
    <circle cx="860" cy="415" r="10" fill="#5a8a3c" opacity="0.6"/>
    <line x1="860" y1="415" x2="860" y2="428" stroke="#5a8a3c" stroke-width="2" opacity="0.7"/>

    <!-- Door arc (bottom wall, center-right) -->
    <path d="M 705 430 A 30 30 0 0 0 675 400" fill="none" stroke="#6b5a47" stroke-width="1.5"/>

    <!-- Fan 1 -->
    <g id="work-room-2-fan-1" data-device="work-room-2-fan-1" data-type="fan" data-room="work-room-2">
      <circle cx="740" cy="80" r="10" fill="none" stroke="#5a4a3a" stroke-width="1.5"/>
      <path d="M 740 70 L 745 90 L 740 85 L 735 90 Z" fill="#5a4a3a"/>
      <text x="740" y="105" font-family="Inter, sans-serif" font-size="8" fill="#7a6a58" text-anchor="middle">Fan 1</text>
    </g>

    <!-- Fan 2 -->
    <g id="work-room-2-fan-2" data-device="work-room-2-fan-2" data-type="fan" data-room="work-room-2">
      <circle cx="740" cy="310" r="10" fill="none" stroke="#5a4a3a" stroke-width="1.5"/>
      <path d="M 740 300 L 745 320 L 740 315 L 735 320 Z" fill="#5a4a3a"/>
      <text x="740" y="335" font-family="Inter, sans-serif" font-size="8" fill="#7a6a58" text-anchor="middle">Fan 2</text>
    </g>

    <!-- Light 1 -->
    <g id="work-room-2-light-1" data-device="work-room-2-light-1" data-type="light" data-room="work-room-2">
      <circle cx="640" cy="60" r="7" fill="#c8b99a" stroke="#c8b99a" stroke-width="1"/>
      <text x="640" y="80" font-family="Inter, sans-serif" font-size="8" fill="#7a6a58" text-anchor="middle">Light 1</text>
    </g>

    <!-- Light 2 -->
    <g id="work-room-2-light-2" data-device="work-room-2-light-2" data-type="light" data-room="work-room-2">
      <circle cx="835" cy="60" r="7" fill="#c8b99a" stroke="#c8b99a" stroke-width="1"/>
      <text x="835" y="80" font-family="Inter, sans-serif" font-size="8" fill="#7a6a58" text-anchor="middle">Light 2</text>
    </g>

    <!-- Light 3 -->
    <g id="work-room-2-light-3" data-device="work-room-2-light-3" data-type="light" data-room="work-room-2">
      <circle cx="740" cy="390" r="7" fill="#c8b99a" stroke="#c8b99a" stroke-width="1"/>
      <text x="740" y="410" font-family="Inter, sans-serif" font-size="8" fill="#7a6a58" text-anchor="middle">Light 3</text>
    </g>
  </g>

  <!-- Entry label -->
  <text x="450" y="510" textAnchor="middle" fill="#6b7280" fontSize="9" fontFamily="Inter, sans-serif" fontWeight="500" letterSpacing="0.1em">
    ↑ ENTRY
  </text>

  <!-- Legend -->
  <g transform="translate(10, 445)">
    <rect x="0" y="0" width="160" height="55" fill="white" stroke="#ccc" stroke-width="0.5" opacity="0.9" rx="3"/>
    <text x="10" y="15" font-family="Inter, sans-serif" font-size="9" fontWeight="bold" fill="#2d2d2d">LEGEND</text>

    <circle cx="25" cy="30" r="5" fill="none" stroke="#5a4a3a" stroke-width="1"/>
    <path d="M 25 26 L 27 34 L 25 32 L 23 34 Z" fill="#5a4a3a"/>
    <text x="40" y="33" font-family="Inter, sans-serif" font-size="8" fill="#2d2d2d">Fan (2/room)</text>

    <circle cx="25" cy="45" r="4" fill="#c8b99a" stroke="#c8b99a" stroke-width="0.5"/>
    <text x="40" y="48" font-family="Inter, sans-serif" font-size="8" fill="#2d2d2d">Light (3/room)</text>
  </g>
</svg>
